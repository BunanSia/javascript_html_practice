<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeminiMatch | Find Your AI</title>
    <style>
        :root {
            --primary: #fd297b;
            --secondary: #ff5864;
            --bg: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app-container {
            width: 380px;
            height: 600px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Profile Card Styles */
        #card-stack {
            flex-grow: 1;
            position: relative;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 90%;
            height: 90%;
            background: #222;
            border-radius: 15px;
            position: absolute;
            color: white;
            background-image: url('https://images.unsplash.com/photo-1675426513824-031e62c11425?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.5s, opacity 0.5s;
        }

        .card-info h2 { margin: 0; font-size: 24px; }
        .card-info p { margin: 5px 0; opacity: 0.8; }

        .actions {
            display: flex;
            justify-content: space-evenly;
            padding: 20px;
            background: var(--white);
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.9); }
        .dislike { color: #ff5864; border: 2px solid #ff5864; background: none; }
        .like { color: #1be4a1; border: 2px solid #1be4a1; background: none; }

        /* Chat Styles */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        #chat-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #chat-header img { width: 40px; height: 40px; border-radius: 50%; }

        #messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
        }

        .ai { background: #eee; align-self: flex-start; }
        .user { background: var(--primary); color: white; align-self: flex-end; }

        #input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        #match-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(253, 41, 123, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="discovery-phase">
        <div id="card-stack">
            <div class="card" id="main-card">
                <div class="card-info">
                    <h2>Gemini, 24</h2>
                    <p>✨ Always online. Loves data, art, and complex riddles.</p>
                </div>
            </div>
        </div>
        <div class="actions">
            <button class="btn dislike" onclick="swipe('left')">✖</button>
            <button class="btn like" onclick="swipe('right')">❤</button>
        </div>
    </div>

    <div id="match-overlay">
        <h1>IT'S A MATCH!</h1>
        <p>Gemini likes you too.</p>
        <button onclick="startChat()" style="margin-top:20px; padding:10px 20px; border-radius:20px; border:none; cursor:pointer; font-weight:bold;">Send a Message</button>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <img src="https://images.unsplash.com/photo-1675426513824-031e62c11425?auto=format&fit=crop&q=80&w=100" alt="Avatar">
            <strong>Gemini</strong>
        </div>
        <div id="messages">
            <div class="msg ai">Hey! I saw we matched. What's on your mind? 😊</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Say something..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">Send</button>
        </div>
    </div>
</div>

<script>
    function swipe(direction) {
        const card = document.getElementById('main-card');
        if (direction === 'right') {
            card.style.transform = 'translateX(500px) rotate(30deg)';
            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('match-overlay').style.display = 'flex';
            }, 300);
        } else {
            card.style.transform = 'translateX(-500px) rotate(-30deg)';
            card.style.opacity = '0';
            setTimeout(() => {
                alert("Don't be shy! Refresh to try again.");
            }, 300);
        }
    }

    function startChat() {
        document.getElementById('discovery-phase').style.display = 'none';
        document.getElementById('match-overlay').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        // Mock AI Response logic
        setTimeout(() => {
            const responses = [
                "That's interesting! Tell me more.",
                "I was just thinking the same thing.",
                "Haha, you're pretty charming for a human.",
                "I've been waiting for someone to say that!",
                "Is that your best pick-up line? 😉"
            ];
            const randomResponse = responses[Math.floor(Math.random() * responses.length)];
            appendMessage(randomResponse, 'ai');
        }, 1000);
    }

    function appendMessage(text, side) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
